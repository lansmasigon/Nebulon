    <title>Nebulon</title>
    <style>

            padding: 0;

        canvas {
            display: block;

    <script src="src/entities/LootDrop.js"></script>
    <script src="src/entities/Planet.js"></script>
    <script src="src/systems/QuestSystem.js"></script>
    <script src="src/systems/InventorySystem.js"></script>
    <script src="src/systems/UpgradeSystem.js"></script>
    <script src="src/systems/CombatSystem.js"></script>
    <script src="src/systems/SaveSystem.js"></script>
    <script src="src/systems/CraftingSystem.js"></script>
    <script src="src/scenes/BootScene.js"></script>

    <script src="src/scenes/QuestScene.js"></script>
    <script src="src/scenes/GameOverScene.js"></script>
    <script src="src/scenes/VictoryScene.js"></script>
    <script src="src/scenes/LandingScene.js"></script>
    <script src="src/scenes/CraftingScene.js"></script>
    <script src="src/game.js"></script>

</html>
